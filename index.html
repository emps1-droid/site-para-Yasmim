<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Yasmim Especial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-page" class="view">
        <header>
            <h1 class="top-message">Yasmim, você é muito especial!</h1>
        </header>

        <main>
            <div class="photo-container">
                <img src="foto-yasmim.jpeg" alt="Yasmim" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
                <div class="photo-placeholder">
                    <span></span>
                    <!-- <img src=foto-yasmim.jpeg" alt="Yasmim"> -->
                </div>
            </div>

            <div class="actions">
                <button id="hearts-button" class="btn">Corações! ❤️</button>
                <button id="next-page-btn" class="btn">Clique para uma surpresa</button>
            </div>
        </main>

        <footer>
            <div class="bottom-message">
                <p>Oii preta, aproveitei que consegui fazer um "site" para o trabalho e quis fazer um pra você também, você tem se tornado uma pessoa muito especial pra mim.</p>
            </div>
        </footer>
    </div>

    <div id="secret-page" class="view hidden">
        <div class="centered-message">
            <h1>TE AMOOO</h1>
            <button id="back-btn" class="btn-small">Voltar</button>
        </div>
    </div>

    <canvas id="hearts-canvas"></canvas>

    <script src="scrypt.js"></script>
</body>
</html>
